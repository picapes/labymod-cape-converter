<!DOCTYPE html>
<!-- yes the code is generated using AI, who realistically would spend time making this simple shi- -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiCapes - LabyMod Cape Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{width:100%;max-width:700px}
.card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:32px}
.header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.logo{width:48px;height:48px}
.title h1{font-size:1.4rem;font-weight:600}
.title p{color:#8b949e;font-size:.95rem}
.dropzone{margin-top:20px;border:2px dashed #30363d;border-radius:12px;padding:48px 20px;text-align:center;cursor:pointer;transition:.15s}
.dropzone:hover,.dropzone.drag{border-color:#58a6ff;background:#0f1722}
.dropzone h2{font-size:1.1rem;margin-bottom:8px}
.dropzone p{color:#8b949e}
input[type=file]{display:none}
.files{margin-top:20px;display:flex;flex-direction:column;gap:8px}
.file{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;font-size:.9rem}
.btn{width:100%;margin-top:20px;padding:12px;border:none;border-radius:8px;background:#238636;color:#fff;font-weight:600;cursor:pointer}
.btn:hover{background:#2ea043}
.btn:disabled{opacity:.5;cursor:not-allowed}
.footer{margin-top:20px;text-align:center;color:#8b949e;font-size:.85rem}
</style>
</head>
<body>

<div class="container">
    <div class="card">

        <div class="header">
            <img class="logo" src="https://assets.picapes.syanic.org/picapeslogo.png" alt="PiCapes">
            <div class="title">
                <h1>PiCapes's LabyMod Cape Converter</h1>
                <p>Convert cape+elytra textures into LabyMod cape format</p>
            </div>
        </div>

        <div class="dropzone" id="dropzone">
            <h2>Drop images here</h2>
            <p>or click to browse</p>
        </div>

        <input type="file" id="files" multiple accept="image/*">

        <div class="files" id="fileList"></div>

        <button class="btn" id="convertBtn" disabled>
            Convert
        </button>

        <div class="footer">
            Supports any 2:1 cape texture resolution (64×32, 128×64, 256×128, ...)
        </div>

    </div>
</div>

<script>
const dropzone=document.getElementById("dropzone");
const fileInput=document.getElementById("files");
const fileList=document.getElementById("fileList");
const convertBtn=document.getElementById("convertBtn");

let files=[];

dropzone.onclick=()=>fileInput.click();

fileInput.onchange=e=>{
    addFiles([...e.target.files]);
};

dropzone.addEventListener("dragover",e=>{
    e.preventDefault();
    dropzone.classList.add("drag");
});

dropzone.addEventListener("dragleave",()=>{
    dropzone.classList.remove("drag");
});

dropzone.addEventListener("drop",e=>{
    e.preventDefault();
    dropzone.classList.remove("drag");
    addFiles([...e.dataTransfer.files]);
});

function addFiles(newFiles){
    files.push(...newFiles);
    renderFiles();
}

function renderFiles(){
    fileList.innerHTML="";

    files.forEach(file=>{
        const div=document.createElement("div");
        div.className="file";
        div.textContent=file.name;
        fileList.appendChild(div);
    });

    convertBtn.disabled=!files.length;
}

function loadImage(file){
    return new Promise(resolve=>{
        const img=new Image();
        img.onload=()=>resolve(img);
        img.src=URL.createObjectURL(file);
    });
}

convertBtn.onclick=async()=>{

    if(!files.length) return;

    // SINGLE FILE
    if(files.length===1){

        const file=files[0];
        const img=await loadImage(file);

        if(img.width!==img.height*2){
            alert("Invalid cape texture.\nExpected a 2:1 aspect ratio.");
            return;
        }

        const canvas=document.createElement("canvas");
        const ctx=canvas.getContext("2d");

        const cropW=Math.round(img.width*(22/64));
        const cropH=Math.round(img.height*(17/32));

        canvas.width=cropW;
        canvas.height=cropH;

        ctx.drawImage(
            img,
            0,0,cropW,cropH,
            0,0,cropW,cropH
        );

        const blob=await new Promise(resolve=>
            canvas.toBlob(resolve,"image/png")
        );

        const outputName=
            file.name.replace(/\.[^.]+$/,"")+".png";

        const a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download=outputName;
        a.click();

        URL.revokeObjectURL(a.href);
        return;
    }

    // MULTIPLE FILES
    const zip=new JSZip();
    const usedNames=new Set();
    const invalidFiles=[];

    for(const file of files){

        const img=await loadImage(file);

        if(img.width!==img.height*2){
            invalidFiles.push(file.name);
            continue;
        }

        const canvas=document.createElement("canvas");
        const ctx=canvas.getContext("2d");

        const cropW=Math.round(img.width*(22/64));
        const cropH=Math.round(img.height*(17/32));

        canvas.width=cropW;
        canvas.height=cropH;

        ctx.drawImage(
            img,
            0,0,cropW,cropH,
            0,0,cropW,cropH
        );

        const blob=await new Promise(resolve=>
            canvas.toBlob(resolve,"image/png")
        );

        let outputName=
            file.name.replace(/\.[^.]+$/,"")+".png";

        let counter=1;
        const originalName=outputName;

        while(usedNames.has(outputName)){
            outputName=originalName.replace(
                ".png",
                ` (${counter++}).png`
            );
        }

        usedNames.add(outputName);
        zip.file(outputName,blob);
    }

    if(zip.files && Object.keys(zip.files).length){

        const content=await zip.generateAsync({
            type:"blob"
        });

        const a=document.createElement("a");
        a.href=URL.createObjectURL(content);
        a.download="labymod-capes.zip";
        a.click();

        URL.revokeObjectURL(a.href);
    }

    if(invalidFiles.length){
        alert(
            "Skipped invalid cape textures:\n\n"+
            invalidFiles.join("\n")
        );
    }
};
</script>

</body>
</html>
